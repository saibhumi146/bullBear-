<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - Trading Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-header bg-dark text-white text-center">
                    <h4>Trading Platform</h4>
                </div>
                <div class="card-body">
                    <th:block th:if="${param.registered}">
                        <div class="alert alert-success">Registered successfully! Please login.</div>
                    </th:block>
                    <th:block th:if="${param.error}">
                        <div class="alert alert-danger">Invalid email or password.</div>
                    </th:block>
                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label>Email</label>
                            <input type="email" name="username" class="form-control" required/>
                        </div>
                        <div class="mb-3">
                            <label>Password</label>
                            <input type="password" name="password" class="form-control" required/>
                        </div>
                        <button type="submit" class="btn btn-dark w-100">Login</button>
                    </form>
                    <hr/>
                    <a th:href="@{/register}" class="btn btn-outline-dark w-100">Register</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
