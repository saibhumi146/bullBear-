<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Order History - Trading Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">Trading Platform</span>
    <div>
        <a th:href="@{/dashboard}" class="btn btn-outline-light btn-sm me-2">Dashboard</a>
        <a th:href="@{/portfolio}" class="btn btn-outline-light btn-sm me-2">Portfolio</a>
        <a th:href="@{/logout}" class="btn btn-danger btn-sm">Logout</a>
    </div>
</nav>

<div class="container mt-4">
    <h5>Order History</h5>
    <table class="table table-hover table-bordered">
        <thead class="table-dark">
            <tr>
                <th>Date & Time</th>
                <th>Symbol</th>
                <th>Type</th>
                <th>Quantity</th>
                <th>Price (₹)</th>
                <th>Total (₹)</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="order : ${orders}">
                <td th:text="${order.orderTime}"></td>
                <td th:text="${order.stock.symbol}"></td>
                <td>
                    <span th:if="${order.orderType == 'BUY'}" class="badge bg-success">BUY</span>
                    <span th:if="${order.orderType == 'SELL'}" class="badge bg-danger">SELL</span>
                </td>
                <td th:text="${order.quantity}"></td>
                <td th:text="${#numbers.formatDecimal(order.price, 1, 2)}"></td>
                <td th:text="${#numbers.formatDecimal(order.price * order.quantity, 1, 2)}"></td>
            </tr>
        </tbody>
    </table>

    <th:block th:if="${#lists.isEmpty(orders)}">
        <div class="alert alert-info">No orders placed yet.</div>
    </th:block>
</div>
</body>
</html>
