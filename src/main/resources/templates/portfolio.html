<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Portfolio - Trading Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <style>
        .profit { color: #28a745; font-weight: bold; }
        .loss { color: #dc3545; font-weight: bold; }
        .stat-card { border-radius: 12px; padding: 20px; color: white; }
        .flash-green { background-color: #d4edda !important; transition: background-color 0.5s; }
        .flash-red { background-color: #f8d7da !important; transition: background-color 0.5s; }
    </style>
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand fw-bold">Trading Platform</span>
    <div>
        <a th:href="@{/dashboard}" class="btn btn-outline-light btn-sm me-2">Dashboard</a>
        <a th:href="@{/orders}" class="btn btn-outline-light btn-sm me-2">Order History</a>
        <a th:href="@{/logout}" class="btn btn-danger btn-sm">Logout</a>
    </div>
</nav>

<div class="container mt-4">

    <!-- Stat cards -->
    <div class="row mb-4 g-3">
        <div class="col-md-4">
            <div class="stat-card bg-primary">
                <div class="small text-white-50">Total Portfolio Value</div>
                <div class="fs-4 fw-bold">₹ <span id="totalValue"
                    th:text="${#numbers.formatDecimal(totalValue, 1, 2)}"></span></div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card bg-success">
                <div class="small text-white-50">Available Balance</div>
                <div class="fs-4 fw-bold">₹ <span
                    th:text="${#numbers.formatDecimal(user.balance, 1, 2)}"></span></div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card bg-dark">
                <div class="small text-white-50">Total P&amp;L</div>
                <div class="fs-4 fw-bold" id="totalPnl">Calculating...</div>
            </div>
        </div>
    </div>

    <!-- Portfolio table -->
    <div class="card shadow-sm">
        <div class="card-header bg-dark text-white d-flex justify-content-between">
            <span>My Holdings</span>
            <span class="badge bg-success" id="liveIndicator">LIVE</span>
        </div>
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>Symbol</th>
                        <th>Company</th>
                        <th>Qty</th>
                        <th>Avg Price (₹)</th>
                        <th>Current Price (₹)</th>
                        <th>Current Value (₹)</th>
                        <th>P&amp;L</th>
                        <th>P&amp;L %</th>
                    </tr>
                </thead>
                <tbody id="portfolioBody">
                    <tr th:each="p : ${portfolio}"
                        th:id="'prow-' + ${p.stock.id}"
                        th:data-qty="${p.quantity}"
                        th:data-avg="${p.averagePrice}"
                        th:data-stockid="${p.stock.id}">
                        <td class="fw-bold" th:text="${p.stock.symbol}"></td>
                        <td th:text="${p.stock.name}"></td>
                        <td th:text="${p.quantity}"></td>
                        <td th:text="${#numbers.formatDecimal(p.averagePrice, 1, 2)}"></td>
                        <td th:id="'pPrice-' + ${p.stock.id}"
                            th:text="${#numbers.formatDecimal(p.stock.price, 1, 2)}"></td>
                        <td th:id="'pValue-' + ${p.stock.id}"
                            th:text="${#numbers.formatDecimal(p.stock.price * p.quantity, 1, 2)}"></td>
                        <td th:id="'pPnl-' + ${p.stock.id}">--</td>
                        <td th:id="'pPnlPct-' + ${p.stock.id}">--</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <th:block th:if="${#lists.isEmpty(portfolio)}">
        <div class="alert alert-info mt-3">
            You have no stocks yet. Go to dashboard and buy some!
        </div>
    </th:block>

    <!-- Portfolio chart -->
    <div class="card shadow-sm mt-4">
        <div class="card-header bg-dark text-white">Portfolio Breakdown</div>
        <div class="card-body d-flex justify-content-center">
            <canvas id="portfolioChart" width="350" height="350"></canvas>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
    const portfolioRows = document.querySelectorAll('[data-stockid]');
    const stockPrices = {};

    portfolioRows.forEach(row => {
        const stockId = row.getAttribute('data-stockid');
        const priceCell = document.getElementById('pPrice-' + stockId);
        if (priceCell) {
            stockPrices[stockId] = parseFloat(priceCell.textContent);
        }
    });

    function updatePnL() {
        let totalPnl = 0;
        portfolioRows.forEach(row => {
            const stockId = row.getAttribute('data-stockid');
            const qty = parseFloat(row.getAttribute('data-qty'));
            const avg = parseFloat(row.getAttribute('data-avg'));
            const currentPrice = stockPrices[stockId] || avg;

            const pnl = (currentPrice - avg) * qty;
            const pnlPct = ((currentPrice - avg) / avg * 100).toFixed(2);
            const value = (currentPrice * qty).toFixed(2);

            const pnlCell = document.getElementById('pPnl-' + stockId);
            const pnlPctCell = document.getElementById('pPnlPct-' + stockId);
            const valueCell = document.getElementById('pValue-' + stockId);

            if (pnlCell) {
                pnlCell.innerHTML = pnl >= 0
                    ? '<span class="profit">▲ ₹' + pnl.toFixed(2) + '</span>'
                    : '<span class="loss">▼ ₹' + Math.abs(pnl).toFixed(2) + '</span>';
            }
            if (pnlPctCell) {
                pnlPctCell.innerHTML = pnl >= 0
                    ? '<span class="profit">+' + pnlPct + '%</span>'
                    : '<span class="loss">' + pnlPct + '%</span>';
            }
            if (valueCell) valueCell.textContent = value;
            totalPnl += pnl;
        });

        const totalPnlEl = document.getElementById('totalPnl');
        if (totalPnlEl) {
            totalPnlEl.innerHTML = totalPnl >= 0
                ? '<span style="color:#90ee90">▲ ₹' + totalPnl.toFixed(2) + '</span>'
                : '<span style="color:#ff6b6b">▼ ₹' + Math.abs(totalPnl).toFixed(2) + '</span>';
        }
    }

    updatePnL();

    const socket = new SockJS('/ws');
    const stompClient = Stomp.over(socket);
    stompClient.debug = null;

    stompClient.connect({}, function () {
        stompClient.subscribe('/topic/prices', function (message) {
            const stocks = JSON.parse(message.body);
            stocks.forEach(stock => {
                stockPrices[stock.id] = stock.price;
                const priceCell = document.getElementById('pPrice-' + stock.id);
                if (priceCell) {
                    priceCell.textContent = stock.price.toFixed(2);
                    const row = document.getElementById('prow-' + stock.id);
                    if (row) {
                        const avg = parseFloat(row.getAttribute('data-avg'));
                        row.classList.add(stock.price >= avg ? 'flash-green' : 'flash-red');
                        setTimeout(() => {
                            row.classList.remove('flash-green', 'flash-red');
                        }, 500);
                    }
                }
            });
            updatePnL();
        });
    });

    // Portfolio pie chart
    const labels = [];
    const values = [];
    const colors = ['#4e73df','#1cc88a','#36b9cc','#f6c23e','#e74a3b','#858796','#5a5c69'];

    portfolioRows.forEach((row, i) => {
        const stockId = row.getAttribute('data-stockid');
        const qty = parseFloat(row.getAttribute('data-qty'));
        const price = stockPrices[stockId] || 0;
        const symbol = row.querySelector('td').textContent;
        labels.push(symbol);
        values.push((price * qty).toFixed(2));
    });

    if (labels.length > 0) {
        new Chart(document.getElementById('portfolioChart'), {
            type: 'doughnut',
            data: {
                labels: labels,
                datasets: [{
                    data: values,
                    backgroundColor: colors.slice(0, labels.length),
                    borderWidth: 2
                }]
            },
            options: {
                responsive: false,
                plugins: {
                    legend: { position: 'bottom' }
                }
            }
        });
    }
</script>
</body>
</html>
